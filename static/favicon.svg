<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark navy background -->
    <linearGradient id="bg" x1="40" y1="40" x2="472" y2="472" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060E1A"/>
      <stop offset="1" stop-color="#0B1523"/>
    </linearGradient>

    <!-- Outer rounded rect border -->
    <linearGradient id="border-g" x1="40" y1="40" x2="472" y2="472" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#A855F7" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Circle lens stroke gradient (diagonal) -->
    <linearGradient id="lens-stroke" x1="118" y1="118" x2="394" y2="394" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.45" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>

    <!-- Code bars fill — top-to-bottom, cyan → purple -->
    <linearGradient id="bars" x1="256" y1="158" x2="256" y2="354" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.34" stop-color="#60A5FA"/>
      <stop offset="0.67" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>

    <!-- Soft inner glow behind bars -->
    <radialGradient id="inner-glow" cx="256" cy="256" r="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#162A4A" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#060E1A" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip: bars are clipped to the inner circle -->
    <clipPath id="lens-clip">
      <circle cx="256" cy="256" r="130"/>
    </clipPath>

    <!-- Glow on the lens ring -->
    <filter id="ring-glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow on bars -->
    <filter id="bar-glow" x="-5%" y="-30%" width="110%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="40" y="40" width="432" height="432" rx="112" fill="url(#bg)"/>
  <rect x="42" y="42" width="428" height="428" rx="110" stroke="url(#border-g)" stroke-width="2"/>

  <!-- Radial glow inside the lens area -->
  <circle cx="256" cy="256" r="130" fill="url(#inner-glow)"/>

  <!-- Lens ring -->
  <circle cx="256" cy="256" r="138"
          stroke="url(#lens-stroke)" stroke-width="8" fill="none"
          filter="url(#ring-glow)"/>

  <!--
    Code lines inside the lens — simulating a formatted code block:

      function fmt() {        ← long, root level   (bar 1)
        return parse(value)   ← indented, long      (bar 2)
        return clean          ← indented, shorter   (bar 3)
      }                       ← root, very short    (bar 4)

    Left edges:
      root bars (1, 4) → clipped by circle's left edge (~x 150-151)
      indented bars (2, 3) → start at x=178 (clearly inside circle)

    Right edges of bars 2, 3, 4 are manually shorter; bar 1 is circle-clipped.
  -->
  <g clip-path="url(#lens-clip)" fill="url(#bars)" filter="url(#bar-glow)">

    <!-- Bar 1: root header — full-width, both edges circle-clipped -->
    <rect x="88"  y="158" width="380" height="36" rx="9"/>

    <!-- Bar 2: indented, long body line -->
    <rect x="178" y="211" width="204" height="33" rx="8"/>

    <!-- Bar 3: indented, shorter body line -->
    <rect x="178" y="261" width="138" height="33" rx="8"/>

    <!-- Bar 4: root closing — short, left edge circle-clipped, right is short -->
    <rect x="88"  y="314" width="148" height="36" rx="9"/>

  </g>
</svg>
