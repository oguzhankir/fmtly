<!doctype html>
<html lang="en" data-theme="dark" style="background-color: #0a0a0a">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link rel="icon" href="%sveltekit.assets%/icon.png" />

	<!-- Google Fonts: Geist Sans (400, 500, 600) + JetBrains Mono (400, 500) -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link rel="preload"
		href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
		as="style" />
	<link rel="stylesheet"
		href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />

	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>

	<!-- Cloudflare Web Analytics (production only) -->
	<script>
		if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
			var s = document.createElement('script');
			s.defer = true;
			s.src = 'https://static.cloudflareinsights.com/beacon.min.js';
			s.setAttribute('data-cf-beacon', '{"token": "YOUR_CF_ANALYTICS_TOKEN"}');
			document.body.appendChild(s);
		}
	</script>
</body>

</html>
