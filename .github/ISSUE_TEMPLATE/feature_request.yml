name: Feature request
description: Suggest a product or workflow improvement
title: "[Feature]: "
labels:
  - enhancement
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.

        For new tools, prefer the "Tool proposal" template.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched for existing feature requests
          required: true
        - label: This request aligns with fmtly's browser-only architecture
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: As a ..., I need ..., so that ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred approach
      placeholder: What should happen in UI/UX and behavior?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or alternative you've evaluated?

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is complete?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      options:
        - Contributor experience
        - End-user UX
        - Performance
        - Accessibility
        - SEO
        - Developer ergonomics
        - Documentation
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to relevant issues, docs, competitor examples, or specs
